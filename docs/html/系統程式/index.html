<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系統程式 — 陳鍾誠的課程教材</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
header { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: #fff; padding: 40px 20px; text-align: center; }
header h1 { font-size: 2rem; margin-bottom: 8px; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
.tabs { display: flex; gap: 4px; background: #fff; border-radius: 10px; padding: 6px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.tab { flex: 1; padding: 12px 20px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 1rem; color: #666; }
.tab:hover { background: #f0f0f5; }
.tab.active { background: #e74c3c; color: #fff; }
.search { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px; }
.search:focus { border-color: #e74c3c; outline: none; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
.card h3 { font-size: 1rem; margin-bottom: 4px; }
.card h3 a { color: #333; text-decoration: none; }
.card h3 a:hover { color: #e74c3c; }
.card p { font-size: 0.85rem; color: #777; }
.links { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 6px; }
.links a { font-size: 0.75rem; padding: 3px 10px; border-radius: 5px; text-decoration: none; color: #fff; background: #e74c3c; }
.links a:hover { opacity: 0.85; }
.section-title { font-size: 1.1rem; font-weight: 700; margin: 24px 0 12px; border-bottom: 2px solid #e74c3c; padding-bottom: 4px; }
.section-title:first-of-type { margin-top: 0; }
footer { text-align: center; padding: 20px; color: #999; font-size: 0.8rem; }
footer a { color: #e74c3c; }
</style>
</head>
<body>
<header>
  <h1>系統程式</h1>
  <p>從高階語言到機器碼的完整轉換</p>
</header>
<div class="container">
<div class="tabs">
  <button class="tab active" data-tab="概念">📖 概念 <span id="c0">0</span></button>
  <button class="tab" data-tab="程式碼">💻 程式碼 <span id="c1">0</span></button>
</div>
<input class="search" id="search" placeholder="搜尋..." oninput="doSearch()">
<div id="content"></div>
<footer><a href="https://github.com/ccckmit/course0/blob/main/wiki/%E7%B3%BB%E7%B5%B1%E7%A8%8B%E5%BC%8F/index.md">index.md</a></footer>
</div>
<script>
var WIKI = 'https://github.com/ccckmit/course0/blob/main/wiki/%E7%B3%BB%E7%B5%B1%E7%A8%8B%E5%BC%8F';
var CODE = 'https://github.com/ccckmit/course0/blob/main/code/%E7%B3%BB%E7%B5%B1%E7%A8%8B%E5%BC%8F';

var CODE_MAP = {
  '編譯器': ['compiler/py/py1i','compiler/py/py1c'],
  '作業系統': ['os/mini-riscv-os2','os/xv7'],
  '虛擬機': ['irvm/py0/py0i','irvm/qd0/qd0c'],
  '網路': ['network/fastapi0'],
  '直譯器': ['irvm/py0/py0i'],
  'RISC-V': ['os/mini-riscv-os2'],
  'Linux': ['os/xv7'],
  'HTTP': ['network/fastapi0'],
  'C語言': ['compiler/c/c0'],
  'Socket': ['network/drop0box'],
  'Unix': ['os/xv7'],
};

function findCode(name) {
  var keys = Object.keys(CODE_MAP);
  for (var i = 0; i < keys.length; i++) {
    if (name.indexOf(keys[i]) !== -1) {
      var paths = CODE_MAP[keys[i]];
      var links = '';
      for (var j = 0; j < paths.length; j++) {
        links += '<a href="' + CODE + '/' + paths[j] + '">📁 ' + paths[j] + '</a>';
      }
      return links;
    }
  }
  return '';
}

var concepts = {
  '基礎概念': [
    {name:'系統程式的歷史', file:'系統程式的歷史.md'},
    {name:'程式語言', file:'程式語言.md'},
    {name:'編譯器', file:'編譯器.md'},
    {name:'作業系統', file:'作業系統.md'},
    {name:'虛擬機', file:'虛擬機.md'},
    {name:'網路', file:'網路.md'},
    {name:'雲端技術', file:'雲端技術.md'},
    {name:'直譯器', file:'直譯器.md'},
    {name:'LISP', file:'LISP.md'},
    {name:'Prolog', file:'Prolog.md'},
    {name:'並行計算與異構平台', file:'並行計算與異構平台.md'},
    {name:'AI的加速技術', file:'AI的加速技術.md'},
    {name:'管線處理與編譯器', file:'管線處理與編譯器.md'},
  ],
  '核心主題': [
    {name:'RISC-V', file:'RISC-V.md'},
    {name:'LLVM', file:'LLVM.md'},
    {name:'Linux系統呼叫', file:'Linux系統呼叫.md'},
    {name:'行程與執行緒', file:'行程與執行緒.md'},
    {name:'記憶體管理', file:'記憶體管理.md'},
    {name:'垃圾搜集', file:'垃圾搜集.md'},
    {name:'虛擬記憶體', file:'虛擬記憶體.md'},
    {name:'檔案系統', file:'檔案系統.md'},
    {name:'TCP-IP協定', file:'TCP-IP協定.md'},
    {name:'HTTP', file:'HTTP.md'},
    {name:'C語言', file:'C語言.md'},
    {name:'排程', file:'排程.md'},
    {name:'同步與通訊', file:'同步與通訊.md'},
    {name:'Socket網路介面', file:'Socket網路介面.md'},
    {name:'密碼學與資訊安全', file:'密碼學與資訊安全.md'},
    {name:'區塊鏈與比特幣', file:'區塊鏈與比特幣.md'},
    {name:'版本控制', file:'版本控制.md'},
    {name:'Unix', file:'Unix.md'},
    {name:'Unix_v6', file:'Unix_v6.md'},
  ],
  '工具': [
    {name:'QEMU', file:'QEMU.md'},
    {name:'Docker', file:'Docker.md'},
    {name:'Kubernetes', file:'Kubernetes.md'},
    {name:'Git', file:'../軟體工程/Git.md'},
    {name:'c4', file:'c4.md'},
    {name:'xv6', file:'xv6.md'},
    {name:'Rust', file:'Rust.md'},
    {name:'zig語言', file:'zig語言.md'},
  ],
  '人物': [
    {name:'Linus Torvalds', file:'Linus_Torvalds.md', desc:'Linux 與 Git 發明者'},
    {name:'Ken Thompson', file:'Ken_Thompson.md', desc:'Unix 共同發明者'},
    {name:'Dennis Ritchie', file:'Dennis_Ritchie.md', desc:'C 語言與 Unix 發明者'},
    {name:'Fabrice Bellard', file:'Fabrice_Bellard.md', desc:'QEMU 與 FFmpeg 發明者'},
  ],
};

var codes = [
  {name:'編譯器py1i', path:'compiler/py/py1i', files:['py1i.py','ast.py']},
  {name:'編譯器py1c', path:'compiler/py/py1c', files:['py0c.py','qd0vm.py']},
  {name:'Python直譯器', path:'irvm/py0/py0i', files:['py0i.py','ast.py']},
  {name:'虛擬機qd0c', path:'irvm/qd0/qd0c', files:['test.py']},
  {name:'網路FastAPI', path:'network/fastapi0', files:['example.py']},
  {name:'Git伺服器', path:'network/git0server', files:['git_server_fastapi.py']},
  {name:'Dropbox複製', path:'network/drop0box', files:['client.py','server.py']},
  {name:'pip0', path:'tool/pip0', files:['pip0.py']},
];

document.getElementById('c0').textContent = Object.keys(concepts).length + ' 區塊';
document.getElementById('c1').textContent = codes.length;

function showCard(item) {
  var h = '<div class="card"><h3>';
  if (item.file) h += '<a href="' + WIKI + '/' + item.file + '">' + item.name + '</a>';
  else h += item.name;
  h += '</h3>';
  if (item.desc) h += '<p>' + item.desc + '</p>';
  var links = findCode(item.name);
  if (links) h += '<div class="links">' + links + '</div>';
  h += '</div>';
  return h;
}

function renderConcept() {
  var html = '';
  var keys = Object.keys(concepts);
  for (var k = 0; k < keys.length; k++) {
    var key = keys[k];
    var items = concepts[key];
    html += '<h2 class="section-title">' + key + '</h2><div class="grid">';
    for (var i = 0; i < items.length; i++) {
      html += showCard(items[i]);
    }
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

function renderCode() {
  var html = '<h2 class="section-title">💻 程式碼</h2><div class="grid">';
  for (var i = 0; i < codes.length; i++) {
    var c = codes[i];
    html += '<div class="card"><h3>' + c.name + '</h3><div class="links">';
    for (var j = 0; j < c.files.length; j++) {
      html += '<a href="' + CODE + '/' + c.path + '/' + c.files[j] + '">' + c.files[j] + '</a>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function render(tab) {
  if (tab === '概念') renderConcept();
  else renderCode();
}

function doSearch() {
  var q = document.getElementById('search').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.display = cards[i].textContent.toLowerCase().indexOf(q) === -1 ? 'none' : '';
  }
}

var cur = '概念';
render(cur);
var tabs = document.querySelectorAll('.tab');
for (var i = 0; i < tabs.length; i++) {
  tabs[i].onclick = function() {
    for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
    this.classList.add('active');
    cur = this.getAttribute('data-tab');
    document.getElementById('search').value = '';
    render(cur);
  };
}
</script>
</body>
</html>
