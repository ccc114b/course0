<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演算法 — 陳鍾誠的課程教材</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
header { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); color: #fff; padding: 40px 20px; text-align: center; }
header h1 { font-size: 2rem; margin-bottom: 8px; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
.tabs { display: flex; gap: 4px; background: #fff; border-radius: 10px; padding: 6px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-wrap: wrap; }
.tab { flex: 1; min-width: 80px; padding: 10px 16px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: #666; }
.tab:hover { background: #f0f0f5; }
.tab.active { background: #e67e22; color: #fff; }
.search { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px; }
.search:focus { border-color: #e67e22; outline: none; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
.card h3 { font-size: 1rem; margin-bottom: 4px; }
.card h3 a { color: #333; text-decoration: none; }
.card h3 a:hover { color: #e67e22; }
.card p { font-size: 0.85rem; color: #777; }
.links { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 6px; }
.links a { font-size: 0.75rem; padding: 3px 10px; border-radius: 5px; text-decoration: none; color: #fff; background: #e67e22; }
.links a:hover { opacity: 0.85; }
.section-title { font-size: 1.2rem; font-weight: 700; margin: 20px 0 12px; border-bottom: 2px solid #e67e22; padding-bottom: 4px; }
footer { text-align: center; padding: 20px; color: #999; font-size: 0.8rem; }
footer a { color: #e67e22; }
.hidden { display: none; }
</style>
</head>
<body>
<header>
  <h1>演算法</h1>
  <p>解決問題的計算方法與效率分析</p>
</header>
<div class="container">
<div class="tabs">
  <button class="tab active" data-tab="概念">概念 <span id="c0">0</span></button>
  <button class="tab" data-tab="主題">主題 <span id="c1">0</span></button>
  <button class="tab" data-tab="工具">工具 <span id="c2">0</span></button>
  <button class="tab" data-tab="程式碼">程式碼 <span id="c3">0</span></button>
</div>
<input class="search" id="search" placeholder="搜尋..." oninput="doSearch()">
<div id="content"></div>
<footer><a href="https://github.com/ccckmit/course0/blob/main/wiki/%E6%BC%94%E7%AE%97%E6%B3%95/index.md">index.md</a></footer>
</div>
<script>
var WIKI = 'https://github.com/ccckmit/course0/blob/main/wiki/%E6%BC%94%E7%AE%97%E6%B3%95';
var CODE = 'https://github.com/ccckmit/course0/blob/main/code/%E6%BC%94%E7%AE%97%E6%B3%95';

var data = {
  '概念': [
    {name:'演算法歷史', file:'演算法的歷史.md'},
    {name:'時間複雜度', file:'時間複雜度.md', code:['method/00-bigO']},
    {name:'空間複雜度', file:'空間複雜度.md'},
    {name:'資料結構', file:'資料結構.md', code:['data']},
  ],
  '主題': [
    {name:'字串演算法', file:'字串演算法.md', code:['method/06-搜尋法']},
    {name:'網路流', file:'網路流.md'},
    {name:'計算幾何', file:'計算幾何.md'},
    {name:'近似演算法', file:'近似演算法.md', code:['method/16-逼近法']},
    {name:'隨機演算法', file:'隨機演算法.md', code:['method/09a-隨機法']},
    {name:'線性規劃', file:'線性規劃.md', code:['method/15a-委託法','method/15c-化約法']},
    {name:'排序演算法', file:'排序演算法.md', code:['method/07-分割擊破法/mergeSort','method/05b-改良法']},
    {name:'搜尋法', file:'搜尋法.md', code:['method/06-搜尋法','method/05c-爬山演算法']},
    {name:'圖形演算法', file:'圖形演算法.md'},
    {name:'動態規劃法', file:'動態規劃法.md'},
    {name:'貪婪法', file:'貪婪法.md'},
    {name:'分割擊破法', file:'分割擊破法.md', code:['method/07-分割擊破法']},
    {name:'列舉法', file:'列舉法.md'},
  ],
  '工具': [
    {name:'Python', file:'Python.md'},
  ],
  '程式碼': [
    {name:'Big-O分析', path:'method/00-bigO', files:['bubbleSort.py','lsearch.py','matrixMul.py']},
    {name:'查表法', path:'method/01-查表法', files:['power2n.py','fibonacci.py','Cnk.py']},
    {name:'雜湊法', path:'method/02b-雜湊法', files:['hash1.py','bloomFilter.py','sha256.py']},
    {name:'遞迴法', path:'method/04a-遞迴法', files:['fibonacci.py','hanoi.py','gcd.py']},
    {name:'搜尋法', path:'method/06-搜尋法', files:['astar.py','binSearch.py']},
    {name:'分割擊破', path:'method/07-分割擊破法/mergeSort', files:['mergesort.py','sortTest.py']},
    {name:'隨機法', path:'method/09a-隨機法', files:['random1.py','random2.py']},
    {name:'遺傳演算法', path:'method/09c-遺傳演算法', files:['geneticAlgorithm.py']},
  ]
};

document.getElementById('c0').textContent = data['概念'].length;
document.getElementById('c1').textContent = data['主題'].length;
document.getElementById('c2').textContent = data['工具'].length;
document.getElementById('c3').textContent = data['程式碼'].length;

function showCard(item, isCode) {
  var h = '<div class="card"><h3>';
  if (item.file) h += '<a href="' + WIKI + '/' + item.file + '">' + item.name + '</a>';
  else h += item.name;
  h += '</h3>';
  if (item.code && !isCode) {
    for (var i = 0; i < item.code.length; i++) {
      h += '<div class="links"><a href="' + CODE + '/' + item.code[i] + '">📁 ' + item.code[i] + '</a></div>';
    }
  }
  if (item.files) {
    h += '<div class="links">';
    for (var i = 0; i < item.files.length; i++) {
      h += '<a href="' + CODE + '/' + item.path + '/' + item.files[i] + '">' + item.files[i] + '</a>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function render(tab) {
  var items = data[tab];
  var html = '<h2 class="section-title">' + tab + '</h2><div class="grid">';
  for (var i = 0; i < items.length; i++) {
    html += showCard(items[i], tab === '程式碼');
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function doSearch() {
  var q = document.getElementById('search').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.display = cards[i].textContent.toLowerCase().indexOf(q) === -1 ? 'none' : '';
  }
}

var cur = '概念';
render(cur);
var tabs = document.querySelectorAll('.tab');
for (var i = 0; i < tabs.length; i++) {
  tabs[i].onclick = function() {
    for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
    this.classList.add('active');
    cur = this.getAttribute('data-tab');
    document.getElementById('search').value = '';
    render(cur);
  };
}
</script>
</body>
</html>
