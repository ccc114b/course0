// 取得程式碼連結
function getCodeLinks(item) {
  var links = '';
  
  // 直接來的程式碼
  if (item.py) {
    for (var i = 0; i < item.py.length; i++) {
      links += '<a class="py" href="' + CODE + '/' + item.path + '/' + item.py[i] + '" target="_blank">' + item.py[i] + '</a>';
    }
  }
  if (item.md) {
    for (var i = 0; i < item.md.length; i++) {
      links += '<a class="md" href="' + CODE + '/' + item.path + '/' + item.md[i] + '" target="_blank">' + item.md[i] + '</a>';
    }
  }
  
  return links;
}

// 查詢 wiki 名稱對應的程式碼
function findCode(name) {
  var keys = Object.keys(CODE_MAP);
  for (var i = 0; i < keys.length; i++) {
    if (name.indexOf(keys[i]) !== -1) {
      var paths = CODE_MAP[keys[i]];
      var links = '';
      for (var j = 0; j < paths.length; j++) {
        var p = paths[j];
        var parts = p.split('/');
        var dir = parts.slice(0, -1).join('/');
        var fn = parts[parts.length - 1];
        // 嘗試 both .py and .md
        links += '<a class="py" href="' + CODE + '/' + dir + '/' + fn + '.py" target="_blank">' + fn + '.py</a>';
        links += '<a class="md" href="' + CODE + '/' + dir + '/' + fn + '.md" target="_blank">' + fn + '.md</a>';
      }
      return links;
    }
  }
  return '';
}

// 顯示卡片
function showCard(item, wikiFile) {
  var html = '<div class="card">';
  html += '<h3>';
  if (wikiFile) {
    html += '<a href="' + WIKI + '/' + wikiFile + '" target="_blank">' + item.name + '</a>';
  } else {
    html += item.name;
  }
  html += '</h3>';
  html += '<p>' + (item.desc || '') + '</p>';
  if (item.tags) {
    html += '<div class="tags">';
    for (var i = 0; i < item.tags.length; i++) {
      html += '<span class="tag">' + item.tags[i] + '</span>';
    }
    html += '</div>';
  }
  
  var links = getCodeLinks(item);
  if (!links && item.name) {
    links = findCode(item.name);
  }
  
  if (links) {
    html += '<div class="links">' + links + '</div>';
  }
  
  html += '</div>';
  return html;
}

// 渲染
function render(tab) {
  var html = '';

    }
    html += '</div>';
  } else if (tab === '主題') {
    html = '<h2 class="section-title">主題</h2><div class="grid">';
    for (var i = 0; i < TOPICS.length; i++) {
      html += showCard(TOPICS[i], TOPICS[i].file);
    }
    html += '</div>';
  } else if (tab === '工具') {
    html = '<h2 class="section-title">工具</h2><div class="grid">';
    for (var i = 0; i < TOOLS.length; i++) {
      html += showCard(TOOLS[i], TOOLS[i].file);
    }
    html += '</div>';
    html += '<h2 class="section-title">人物</h2><div class="grid">';
    for (var i = 0; i < PEOPLE.length; i++) {
      html += showCard(PEOPLE[i], PEOPLE[i].file);
    }
    html += '</div>';
  } else if (tab === '程式碼') {
    html = '<h2 class="section-title">程式碼</h2><div class="grid">';
    for (var i = 0; i < CODES.length; i++) {
      html += showCard(CODES[i], null);
    }
    html += '</div>';
  }
  
  document.getElementById('content').innerHTML = html;
}

// 搜尋
function doSearch() {
  var q = document.getElementById('search').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    var text = cards[i].textContent.toLowerCase();
    cards[i].style.display = (q && text.indexOf(q) === -1) ? 'none' : '';
  }
}

// 頁籤切換

render(currentTab);

var tabs = document.querySelectorAll('.tab');
for (var i = 0; i < tabs.length; i++) {
  tabs[i].onclick = function() {
    for (var j = 0; j < tabs.length; j++) {
      tabs[j].classList.remove('active');
    }
    this.classList.add('active');
    currentTab = this.getAttribute('data-tab');
    document.getElementById('search').value = '';
    render(currentTab);
  };
}

// 鍵盤快捷
document.onkeydown = function(e) {
  if (e.key === '1') tabs[0].onclick();
  else if (e.key === '2') tabs[1].onclick();
  else if (e.key === '3') tabs[2].onclick();
  else if (e.key === '4') tabs[3].onclick();
};
</script>
